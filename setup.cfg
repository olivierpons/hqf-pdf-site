; pycodestyle reads setup.cfg, not pyproject.toml, so its configuration lives
; here on its own.
[pycodestyle]
max-line-length = 88
exclude = .venv,migrations,node_modules
; E203 is the documented disagreement between black and pycodestyle: black
; writes `x[len(p) :]`, pycodestyle calls the space before the colon an error.
; PEP 8 treats a slice colon as an operator, so black is right and this stays
; off. W503/W504 are the same story for line breaks around binary operators.
ignore = E203,W503,W504
