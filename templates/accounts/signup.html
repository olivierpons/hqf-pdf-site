{% extends "base.html" %}
{% load i18n crispy_forms_tags %}

{% block title %}{% trans "[Create an account]" %}{% endblock %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-md-7 col-lg-6">
    <h1 class="h3 mb-4">{% trans "[Create an account]" %}</h1>
    <form method="post" novalidate>
      {% csrf_token %}
      {{ form|crispy }}
      <button type="submit" class="btn btn-primary">{% trans "[Create my account]" %}</button>
    </form>
    <p class="mt-3 mb-0 text-body-secondary">
      {% trans "[Already have an account?]" %}
      <a href="{% url 'accounts:login' %}">{% trans "[Log in]" %}</a>
    </p>
  </div>
</div>
{% endblock %}
